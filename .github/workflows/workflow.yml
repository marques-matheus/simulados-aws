name: Deploy to S3 and CloudFront
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'infra/**'
      - '*.txt'
      - '*.py'
      - '*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC 
  contents: read  # Required for checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_CLIENT_ID_MENTOR: ${{ secrets.VITE_COGNITO_CLIENT_ID_MENTOR }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          # Syncs the built React app to S3
          aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
