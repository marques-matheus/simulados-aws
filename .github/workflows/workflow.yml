name: Deploy to S3 and CloudFront
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'infra/**'
      - '.github/**'
      - '*.txt'
      - '*.py'
      - '*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'infra/**'
      - '.github/**'

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required for checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Change to your region

      - name: Deploy to S3
        run: |
          # Clean up old monolithic files and python backend scripts from the bucket
          aws s3 rm s3://${{ secrets.S3_BUCKET_NAME }} --recursive --exclude "*" --include "*.txt" --include "*.py" --include "questoes.json" --include "questoes_data.js" --include "questions.js" --include "*.md" --include "exemplo.json"
          
          # Syncs web files and deletes those no longer in the repo, excluding backend files and scratch JSONs
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} --delete --exclude ".git/*" --exclude ".github/*" --exclude "*.txt" --exclude "*.py" --exclude "*.md" --exclude "questoes*" --exclude "exemplo.json"

      - name: Invalidate CloudFront Cache
        run: |
          # Forces CloudFront to fetch new content immediately
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
